<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 인간발달 수업일기</title>
    <style>
        :root { --main: #27ae60; --sub: #3498db; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f4f3; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--main); text-align: center; margin-bottom: 30px; }
        .box { border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        .info-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .q-display { background: #e8f5e9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--main); font-size: 0.95rem; margin-bottom: 15px; color: #2c3e50; font-weight: 500; }
        button { width: 100%; padding: 15px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit { background: var(--main); margin-bottom: 10px; }
        .btn-view { background: var(--sub); width: 100%; }
        .feedback-card { background: #f9f9f9; padding: 15px; margin-top: 10px; border-radius: 10px; border-left: 4px solid var(--sub); font-size: 0.9rem; }
        .fb-content { color: #e67e22; font-weight: bold; margin-top: 8px; background: white; padding: 8px; border-radius: 5px; border: 1px dashed #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 성장 수업일기</h1>

        <div class="box">
            <label>1. 학생 정보 입력</label>
            <div class="info-row">
                <select id="classSelect" style="flex: 1;">
                    <option value="">반</option>
                    <script>for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}반</option>`);</script>
                </select>
                <select id="numberSelect" style="flex: 1;">
                    <option value="">번호</option>
                    <script>
                        for(let i=1; i<=31; i++) {
                            let v = i < 10 ? '0'+i : i;
                            document.write(`<option value="${v}">${i}번</option>`);
                        }
                    </script>
                </select>
                <input type="text" id="s_name" placeholder="이름" style="flex: 1.5; margin-bottom:0;">
            </div>

            <label>2. 오늘 배운 차시 선택</label>
            <select id="lessonSelect" onchange="updateQuestion()">
                <option value="">-- 차시 선택 --</option>
                <option value="1">1차시: 발달의 개념</option>
                <option value="2">2차시: 발달의 특성</option>
                <option value="3">3차시: 프로이트 심리 성적 발달</option>
                <option value="4">4차시: 에릭슨 심리 사회 발달</option>
                <option value="5">5차시: 스키너 조작적 조건화</option>
                <option value="6">6차시: 스키너 심화</option>
                <option value="7">7차시: 밴듀라 관찰학습</option>
                <option value="8">8차시: 매슬로우의 욕구이론</option>
                <option value="9">9차시: 영아기 발달</option>
                <option value="10">10차시: 아동기 발달</option>
                <option value="11">11차시: 청소년기 발달</option>
                <option value="12">12차시: 마무리</option>
            </select>

            <div id="qDisplay" class="q-display" style="display:none;"></div>

            <label>3. 일기 작성</label>
            <textarea id="content" rows="5" placeholder="질문에 대한 생각을 자유롭게 적어주세요."></textarea>
            
            <button class="btn-submit" onclick="saveData()">오늘의 기록 제출하기</button>
        </div>

        <div class="box" style="border-top: 4px solid var(--sub);">
            <h3 style="margin-top:0; color:var(--sub);">💬 선생님 피드백 확인</h3>
            <button class="btn-view" onclick="loadFeedback()">내 피드백 불러오기</button>
            <div id="feedbackList"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIBUSHOWkvp2V-Zclw1DR03wnz_5f2HhUmpgCljbgySaPdrMEkWvuM2YutFF3vtTFK/exec"; 

        const topics = {
            "1": "💡 1년 전의 나와 지금의 나는 무엇이 달라졌나요?",
            "2": "💡 나의 어린 시절 습관이 지금의 나에게 어떤 영향을 주고 있나요?",
            "3": "💡 내 마음속 천사와 악마는 무엇을 주제로 갈등하고 있나요?",
            "4": "💡 나는 지금 어떤 파도를 넘고 있는가?",
            "5": "💡 나를 춤추게 하는 칭찬 도장은?",
            "6": "💡 행동주의 이론이 적용된 우리 주변의 사례는?",
            "7": "💡 보보 인형 실험이 현대 사회 문제 해결에 적용되는 사례는 어떤 것이 있을까?",
            "8": "💡 요즘 내가 가장 채우고 싶은 욕구는 무엇인가요?",
            "9": "💡 내가 힘들 때 가장 의지하고 싶은 안전 기지는?",
            "10": "💡 나만의 기억 저장 꿀팁?",
            "11": "💡 내가 꿈꾸는 10년뒤, 30년 뒤 나의 모습은 각각 어떤가요?",
            "12": "💡 오늘의 내가 미래의 나에게 보내는 칭찬 편지!"
        };

        function updateQuestion() {
            const val = document.getElementById("lessonSelect").value;
            const display = document.getElementById("qDisplay");
            if(val && topics[val]) {
                display.innerText = topics[val];
                display.style.display = "block";
            } else {
                display.style.display = "none";
            }
        }

        function saveData() {
            const cls = document.getElementById("classSelect").value;
            const num = document.getElementById("numberSelect").value;
            const name = document.getElementById("s_name").value.trim();
            const lesson = document.getElementById("lessonSelect").value;
            const content = document.getElementById("content").value;

            if(!cls || !num || !name || !lesson || !content) return alert("빈칸을 모두 채워주세요!");

            const payload = { class: cls, number: num, name: name, lesson: lesson, content: content };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                alert("제출 완료! 피드백은 나중에 확인해 보세요.");
                location.reload();
            }).catch(() => alert("전송 실패. 네트워크를 확인하세요."));
        }

        function loadFeedback() {
            const cls = document.getElementById("classSelect").value;
            const num = document.getElementById("numberSelect").value;
            const name = document.getElementById("s_name").value.trim();

            if(!cls || !num || !name) return alert("조회하려면 반, 번호, 이름을 모두 입력해야 합니다.");

            const fullId = `${cls}반 ${num}번 ${name}`;
            const list = document.getElementById("feedbackList");
            list.innerHTML = "데이터 조회 중...";

            fetch(`${SCRIPT_URL}?id=${encodeURIComponent(fullId)}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = "";
                if(data.length === 0) list.innerHTML = "<p style='text-align:center; padding:20px;'>작성된 기록이 없습니다.</p>";
                else {
                    data.forEach(item => {
                        list.innerHTML += `
                            <div class="feedback-card">
                                <strong>[${item.lesson} 기록]</strong><br>
                                <div style="margin:5px 0;">${item.content}</div>
                                <div class="fb-content">👨‍🏫 선생님 피드백: ${item.feedback}</div>
                            </div>`;
                    });
                }
            }).catch(e => {
                list.innerHTML = "데이터를 불러오지 못했습니다.";
                console.error(e);
            });
        }
    </script>
</body>
</html>
