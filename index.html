<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 인간발달 수업일기</title>
    <style>
        :root { --main: #27ae60; --sub: #3498db; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f4f3; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--main); text-align: center; margin-bottom: 30px; }
        .box { border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        .q-display { background: #e8f5e9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--main); font-size: 0.95rem; margin-bottom: 15px; min-height: 40px; color: #2c3e50; font-weight: 500; }
        button { width: 100%; padding: 15px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-submit { background: var(--main); margin-bottom: 10px; }
        .btn-view { background: var(--sub); }
        .feedback-card { background: #f9f9f9; padding: 15px; margin-top: 10px; border-radius: 10px; border-left: 4px solid var(--sub); }
        .fb-content { color: #e67e22; font-weight: bold; margin-top: 8px; background: white; padding: 8px; border-radius: 5px; }
        /* 정보 입력창 나란히 배치 */
        .info-row { display: flex; gap: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 성장 수업일기</h1>

        <div class="box">
            <label>1. 학생 정보 입력</label>
            <div class="info-row">
                <select id="classSelect" style="flex: 1.2;">
                    <option value="">반 선택</option>
                    <script>
                        for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}반</option>`);
                    </script>
                </select>
                <select id="numberSelect" style="flex: 1.2;">
                    <option value="">번호 선택</option>
                    <script>
                        for(let i=1; i<=31; i++) {
                            let val = i < 10 ? '0' + i : i;
                            document.write(`<option value="${val}">${i}번</option>`);
                        }
                    </script>
                </select>
                <input type="text" id="s_name" placeholder="이름" style="flex: 1.5; margin-bottom:0;">
            </div>

            <label>2. 오늘 배운 차시 선택</label>
            <select id="lessonSelect" onchange="updateQuestion()">
                <option value="">-- 차시를 선택하세요 --</option>
                <option value="1">1차시: 발달의 개념</option>
                <option value="2">2차시: 발달의 특성</option>
                <option value="3">3차시: 프로이트 심리 성적 발달</option>
                <option value="4">4차시: 에릭슨 심리 사회 발달</option>
                <option value="5">5차시: 스키너 조작적 조건화</option>
                <option value="6">6차시: 스키너 심화 </option>
                <option value="7">7차시: 밴듀라 관찰학습 </option>
                <option value="8">8차시: 매슬로우의 욕구이론</option>
                <option value="9">9차시: 영아기 발달</option>
                <option value="10">10차시: 아동기 발달</option>
                <option value="11">11차시: 청소년기 발달</option>
                <option value="12">12차시: 마무리</option>
            </select>

            <div id="qDisplay" class="q-display" style="display:none;"></div>

            <label>3. 일기 작성</label>
            <textarea id="content" rows="5" placeholder="위 질문에 대한 생각을 적어보세요."></textarea>
            
            <button class="btn-submit" onclick="saveData()">오늘의 기록 제출하기</button>
        </div>

        <div style="margin-top: 20px; font-size: 12px; color: #888; text-align: center;">
            본 서비스는 학습 기록 관리 및 피드백 제공을 위해 학번과 이름을 수집합니다.
        </div>

        <div class="box" style="border-top: 4px solid var(--sub);">
            <h3 style="margin-top:0; color:var(--sub);">💬 선생님 피드백 확인</h3>
            <button class="btn-view" onclick="loadFeedback()">내 피드백 불러오기</button>
            <div id="feedbackList"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIBUSHOWkvp2V-Zclw1DR03wnz_5f2HhUmpgCljbgySaPdrMEkWvuM2YutFF3vtTFK/exec"; 

        const topics = {
            "1": "💡 [발달의 개념] 1년 전의 나와 지금의 나는 무엇이 달라졌나요?",
            "2": "💡 [발달의 특성] 나의 어린 시절 습관이 지금 어떤 영향을 주고 있나요?",
            "3": "💡 [프로이트] 본능과 도덕이 갈등했던 구체적인 순간은?",
            "4": "💡 [에릭슨] 나는 지금 어떤 고민을 가장 많이 하나요?",
            "5": "💡 [스키너] 나는 칭찬을 들을 때 더 의욕이 생기나요?",
            "6": "💡 [스키너] 행동주의 이론이 적용된 사회 분야는?",
            "7": "💡 [밴듀라] 보보 인형 실험의 사례가 적용되는 현대 문제는?",
            "8": "💡 [매슬로우] 나의 소비 습관을 욕구 계층에 따라 분류해보자",
            "9": "💡 [애착] 내가 힘들 때 가장 먼저 떠오르는 사람은?",
            "10": "💡 [정보처리] 나만의 특별한 암기 비법이 있다면?",
            "11": "💡 [청소년] 내가 꿈꾸는 20년 뒤 나의 모습은?",
            "12": "💡 [마무리] 성찰일지 활동 동안 성장한 나에게 해주고 싶은 칭찬 한마디!"
        };

        function updateQuestion() {
            const val = document.getElementById("lessonSelect").value;
            const display = document.getElementById("qDisplay");
            if(val && topics[val]) {
                display.innerText = topics[val];
                display.style.display = "block";
            } else {
                display.style.display = "none";
            }
        }

        // 학번/이름 조합 생성 함수
        function getFullId() {
            const cls = document.getElementById("classSelect").value;
            const num = document.getElementById("numberSelect").value;
            const name = document.getElementById("s_name").value.trim();
            if(!cls || !num || !name) return null;
            return `${cls}반 ${num}번 ${name}`;
        }

       function saveData() {
    const cls = document.getElementById("classSelect").value;
    const num = document.getElementById("numberSelect").value;
    const name = document.getElementById("s_name").value.trim();
    const lesson = document.getElementById("lessonSelect").value;
    const content = document.getElementById("content").value;

    if(!cls || !num || !name || !lesson || !content) return alert("모든 정보를 입력해주세요!");

    // 데이터를 각각 나누어서 전송합니다.
    const data = {
        class: cls,
        number: num,
        name: name,
        lesson: lesson,
        content: content
    };

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
    }).then(() => {
        alert("성공적으로 제출되었습니다!");
        location.reload();
    });
}

        function loadFeedback() {
            const fullId = getFullId();
            if(!fullId) return alert("반, 번호, 이름을 입력해주세요!");
            const list = document.getElementById("feedbackList");
            list.innerHTML = "조회 중...";
            fetch(`${SCRIPT_URL}?id=${encodeURIComponent(fullId)}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = "";
                if(data.length === 0) list.innerHTML = "<p>기록이 없습니다.</p>";
                else {
                    data.forEach(item => {
                        list.innerHTML += `
                            <div class="feedback-card">
                                <strong>[${item.lesson}차시 기록]</strong><br>
                                <small>${item.content}</small>
                                <div class="fb-content">👨‍🏫 선생님: ${item.feedback}</div>
                            </div>`;
                    });
                }
            });
        }
    </script>
</body>
</html>
